<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Remora{% endblock %}</title>

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block head %}{% endblock %}
</head>

<body>
<div class="app-shell">

    {% if show_topbar != False %}
    <header class="topbar">
        <div class="topbar-inner">
            <a href="/ui/dashboard" class="brand-link">
                <img
                    src="{{ url_for('static', filename='img/logo.png') }}"
                    alt="Remora logo"
                    class="brand-logo"
                >
            </a>
        </div>
    </header>
    {% endif %}

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    {% if show_bottom_nav %}
    <nav class="bottom-nav">
        <div class="bottom-nav-inner">

            <a id="bottom-nav-chat" href="/ui/chat-home" class="nav-item {% if active_tab == 'chat' %}active{% endif %}">
                <div class="nav-icon">💬</div>
                <div>Chat</div>
            </a>

            <a id="bottom-nav-memories" href="/ui/memories/select-profile" class="nav-item {% if active_tab == 'memories' %}active{% endif %}">
                <div class="nav-icon">🧠</div>
                <div>Memories</div>
            </a>

            <a href="/ui/time-capsule" class="nav-item {% if active_tab == 'time_capsule' %}active{% endif %}">
                <div class="nav-icon">🕰️</div>
                <div>Time Capsule</div>
            </a>

            <a id="bottom-nav-profile" href="/ui/select-profiles" class="nav-item {% if active_tab == 'profile' %}active{% endif %}">
                <div class="nav-icon">👤</div>
                <div>Profile</div>
            </a>

        </div>
    </nav>
    {% endif %}

</div>

{% block scripts %}{% endblock %}

{% if show_bottom_nav %}
<script>
    (function () {
        const profileId = localStorage.getItem("active_profile_id");

        const chatLink = document.getElementById("bottom-nav-chat");
        const memoriesLink = document.getElementById("bottom-nav-memories");
        const profileLink = document.getElementById("bottom-nav-profile");

        if (!profileId) {
            if (chatLink) {
                chatLink.href = "/ui/select-profiles";
            }

            if (memoriesLink) {
                memoriesLink.href = "/ui/select-profiles";
            }

            if (profileLink) {
                profileLink.href = "/ui/select-profiles";
            }

            return;
        }

        if (chatLink) {
            chatLink.href = `/ui/chat/start?profile_id=${profileId}`;
        }

        if (memoriesLink) {
            memoriesLink.href = `/ui/memories?profile_id=${profileId}`;
        }

        if (profileLink) {
            profileLink.href = `/ui/profiles/${profileId}`;
        }
    })();
</script>
{% endif %}
</body>
</html>
