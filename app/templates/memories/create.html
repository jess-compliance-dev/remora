{% extends "base.html" %}
{% block title %}Create Memorial Profile | Remora{% endblock %}

{% block content %}

<div class="screen center-screen">
    <div class="phone-card profile-create-screen">

        <div class="progress-row top-progress">
            <span class="progress-dot active"></span>
            <span class="progress-line"></span>
            <span class="progress-dot"></span>
            <span class="progress-line"></span>
            <span class="progress-dot"></span>
        </div>

        <div class="profile-create-header">
            <h1>Create a memorial profile</h1>
            <p class="muted">Who would you like to remember?</p>
        </div>

        <form id="create-profile-form" class="stack">
            <input type="hidden" id="profile_image_url" name="profile_image_url">

            <div class="image-upload-placeholder" style="text-align:center; margin-bottom: 8px;">
                <label for="profile-image-input" class="avatar-upload-circle clickable" style="
                    width: 96px;
                    height: 96px;
                    border-radius: 50%;
                    background: #eef0ff;
                    display: inline-flex;
                    align-items: center;
                    justify-content: center;
                    overflow: hidden;
                    cursor: pointer;
                    position: relative;
                ">
                    <img id="profile-image-preview"
                         src=""
                         alt="Profile preview"
                         class="profile-preview hidden"
                         style="width:100%; height:100%; object-fit:cover;">
                    <span id="profile-image-icon" class="image-icon" style="font-size: 30px; color: #7b82d8;">🖼</span>
                </label>

                <input
                    id="profile-image-input"
                    type="file"
                    accept="image/*"
                    class="hidden-file-input"
                    style="display:none;"
                >

                <div style="margin-top: 8px;">
                    <button
                        type="button"
                        class="mini-add-btn"
                        onclick="document.getElementById('profile-image-input').click()"
                        style="
                            width: 30px;
                            height: 30px;
                            border-radius: 50%;
                            border: 1px solid #dfe3f2;
                            background: #fff;
                            color: #5c63d6;
