{% extends "base.html" %}

{% block title %}Add Memory | Remora{% endblock %}

{% block head %}
<style>
    .add-memory-page {
        max-width: 980px;
        margin: 0 auto;
        padding: 28px 20px 56px;
    }

    .add-memory-panel {
        background: #ffffff;
        border: 1px solid #e7e9f4;
        border-radius: 28px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(86, 97, 160, 0.08);
    }

    .add-memory-topbar {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 8px;
    }

    .add-memory-back {
        width: 42px;
        height: 42px;
        border: none;
        background: #eef0ff;
        color: #5c63d6;
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.15s ease;
        flex-shrink: 0;
    }

    .add-memory-back:hover {
        background: #e3e6ff;
        transform: translateY(-1px);
    }

    .add-memory-back svg {
        width: 20px;
        height: 20px;
    }

    .add-memory-header-copy {
        min-width: 0;
    }

    .add-memory-title {
        margin: 0;
        font-size: 34px;
        line-height: 1.1;
        color: #2f355c;
        text-align: left;
    }

    .add-memory-subtitle {
        margin: 10px 0 0;
        color: #8b90b3;
        font-size: 16px;
        line-height: 1.5;
    }

    .add-memory-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
        margin-top: 28px;
    }

    .add-memory-option {
        appearance: none;
        width: 100%;
        border: 1px solid #e7e9f4;
        background: #ffffff;
        border-radius: 22px;
        padding: 22px;
        text-align: left;
        cursor: pointer;
        box-shadow: 0 10px 25px rgba(86, 97, 160, 0.05);
        transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
        min-height: 205px;
        display: flex;
        flex-direction: column;
    }

    .add-memory-option:hover,
    .add-memory-option:focus-visible {
        transform: translateY(-2px);
        box-shadow: 0 14px 28px rgba(86, 97, 160, 0.10);
        border-color: #cfd6f6;
        outline: none;
    }

    .add-memory-icon {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: #eef0ff;
        color: #5c63d6;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 18px;
    }

    .add-memory-icon svg {
        width: 24px;
        height: 24px;
    }

    .add-memory-option-title {
        font-size: 22px;
        font-weight: 700;
        color: #2f355c;
        margin-bottom: 8px;
    }

    .add-memory-option-text {
        font-size: 15px;
        line-height: 1.6;
        color: #7d84a6;
        max-width: 28ch;
    }

    .add-memory-actions {
        margin-top: 22px;
        display: flex;
        justify-content: flex-end;
    }

    .add-memory-cancel {
        width: auto;
        min-width: 160px;
    }

    @media (max-width: 980px) {
        .add-memory-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
    }

    @media (max-width: 640px) {
        .add-memory-page {
            padding: 20px 14px 40px;
        }

        .add-memory-panel {
            padding: 20px;
            border-radius: 24px;
        }

        .add-memory-title {
            font-size: 28px;
        }

        .add-memory-subtitle {
            font-size: 15px;
        }

        .add-memory-grid {
            grid-template-columns: 1fr;
            gap: 14px;
            margin-top: 22px;
        }

        .add-memory-option {
            min-height: 160px;
            padding: 18px;
        }

        .add-memory-option-title {
            font-size: 19px;
        }

        .add-memory-actions {
            justify-content: stretch;
        }

        .add-memory-cancel {
            width: 100%;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="add-memory-page">
    <div class="add-memory-panel">

        <div class="add-memory-topbar">
            <button
                class="add-memory-back"
                type="button"
                aria-label="Go back"
                onclick="window.history.back()"
            >
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M15 18l-6-6 6-6"></path>
                </svg>
            </button>

            <div class="add-memory-header-copy">
                <h1 class="add-memory-title">Add Memory</h1>
                <p class="add-memory-subtitle">
                    Choose what kind of memory you would like to add.
                </p>
            </div>
        </div>

        <div class="add-memory-grid">
            <button class="add-memory-option" type="button" data-kind="text">
                <div class="add-memory-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M7 3.75h7.5L19 8.25v12a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1v-15a1 1 0 0 1 1-1Z"></path>
                        <path d="M14 3.75v4.5h4.5"></path>
                        <path d="M9 12h6"></path>
                        <path d="M9 16h6"></path>
                    </svg>
                </div>
                <div class="add-memory-option-title">Text</div>
                <div class="add-memory-option-text">Write down a meaningful moment, thought, or story.</div>
            </button>

            <button class="add-memory-option" type="button" data-kind="voice">
                <div class="add-memory-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M12 14a3 3 0 0 0 3-3V7a3 3 0 1 0-6 0v4a3 3 0 0 0 3 3Z"></path>
                        <path d="M19 11a7 7 0 0 1-14 0"></path>
                        <path d="M12 18v3"></path>
                        <path d="M8 21h8"></path>
                    </svg>
                </div>
                <div class="add-memory-option-title">Voice</div>
                <div class="add-memory-option-text">Record a spoken memory or a personal message in your own voice.</div>
            </button>

            <button class="add-memory-option" type="button" data-kind="photo">
                <div class="add-memory-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                        <circle cx="9" cy="10" r="2"></circle>
                        <path d="m21 15-4.35-4.35a1 1 0 0 0-1.4 0L7 19"></path>
                    </svg>
                </div>
                <div class="add-memory-option-title">Photo</div>
                <div class="add-memory-option-text">Upload an image connected to a special memory or moment.</div>
            </button>

            <button class="add-memory-option" type="button" data-kind="video">
                <div class="add-memory-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="6" width="13" height="12" rx="2"></rect>
                        <path d="m16 10 5-3v10l-5-3z"></path>
                    </svg>
                </div>
                <div class="add-memory-option-title">Video</div>
                <div class="add-memory-option-text">Preserve a meaningful moment with a short video clip.</div>
            </button>

            <button class="add-memory-option" type="button" data-kind="document">
                <div class="add-memory-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M7 3.75h7.5L19 8.25v12a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1v-15a1 1 0 0 1 1-1Z"></path>
                        <path d="M14 3.75v4.5h4.5"></path>
                        <path d="M9 12h6"></path>
                        <path d="M9 16h4"></path>
                    </svg>
                </div>
                <div class="add-memory-option-title">Document</div>
                <div class="add-memory-option-text">Upload a letter, note, poem, or another meaningful file.</div>
            </button>
        </div>

        <div class="add-memory-actions">
            <button class="btn btn-secondary add-memory-cancel" type="button" onclick="window.history.back()">
                Cancel
            </button>
        </div>

    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.querySelectorAll("[data-kind]").forEach((button) => {
        button.addEventListener("click", () => {
            const kind = button.dataset.kind;
            const params = new URLSearchParams(window.location.search);

            if (kind) {
                params.set("kind", kind);
            }

            window.location.href = `/ui/memories/create?${params.toString()}`;
        });
    });
</script>
{% endblock %}
