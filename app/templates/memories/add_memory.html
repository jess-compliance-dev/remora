{% extends "base.html" %}

{% block title %}Add Memory | Remora{% endblock %}

{% block head %}
<style>
    .add-memory-page {
        max-width: 980px;
        margin: 0 auto;
        padding: 28px 20px 56px;
    }

    .add-memory-panel {
        background: #ffffff;
        border: 1px solid #e7e9f4;
        border-radius: 28px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(86, 97, 160, 0.08);
    }

    .add-memory-topbar {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 8px;
    }

    .add-memory-back {
        width: 42px;
        height: 42px;
        border: none;
        background: #eef0ff;
        color: #5c63d6;
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.15s ease;
        flex-shrink: 0;
    }

    .add-memory-back:hover {
        background: #e3e6ff;
        transform: translateY(-1px);
    }

    .add-memory-back svg {
        width: 20px;
        height: 20px;
    }

    .add-memory-header-copy {
        min-width: 0;
    }

    .add-memory-title {
        margin: 0;
        font-size: 34px;
        line-height: 1.1;
        color: #2f355c;
        text-align: left;
    }

    .add-memory-subtitle {
        margin: 10px 0 0;
        color: #8b90b3;
        font-size: 16px;
        line-height: 1.5;
    }

    .add-memory-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
        margin-top: 28px;
    }

    .add-memory-option {
        appearance: none;
        width: 100%;
        border: 1px solid #e7e9f4;
        background: #ffffff;
        border-radius: 22px;
        padding: 22px;
        text-align: left;
        cursor: pointer;
        box-shadow: 0 10px 25px rgba(86, 97, 160, 0.05);
        transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
        min-height: 205px;
        display: flex;
        flex-direction: column;
    }

    .add-memory-option:hover,
    .add-memory-option:focus-visible {
        transform: translateY(-2px);
        box-shadow: 0 14px 28px rgba(86, 97, 160, 0.10);
        border-color: #cfd6f6;
        outline: none;
    }

    .add-memory-icon {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: #eef0ff;
        color: #5c63d6;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 18px;
    }

    .add-memory-icon svg {
        width: 24px;
        height: 24px;
    }

    .add-memory-option-title {
        font-size: 22px;
        font-weight: 700;
        color: #2f355c;
        margin-bottom: 8px;
    }

    .add-memory-option-text {
        font-size: 15px;
        line-height: 1.6;
        color: #7d84a6;
        max-width: 28ch;
    }

    .add-memory-actions {
        margin-top: 22px;
        display: flex;
        justify-content: flex-end;
    }

    .add-memory-cancel {
        width: auto;
        min-width: 160px;
    }

    .add-memory-status {
        margin-top: 20px;
        min-height: 24px;
        font-size: 14px;
        color: #7d84a6;
    }

    .add-memory-status.is-success {
        color: #1f7a4c;
    }

    .add-memory-status.is-error {
        color: #c23d4b;
    }

    .add-memory-status.is-loading {
        color: #5c63d6;
    }

    .add-memory-option.is-disabled {
        opacity: 0.55;
        cursor: not-allowed;
    }

    .add-memory-option.is-recording {
        border-color: #c23d4b;
        box-shadow: 0 14px 28px rgba(194, 61, 75, 0.12);
    }

    @media (max-width: 980px) {
        .add-memory-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
    }

    @media (max-width: 640px) {
        .add-memory-page {
            padding: 20px 14px 40px;
        }

        .add-memory-panel {
            padding: 20px;
            border-radius: 24px;
        }

        .add-memory-title {
            font-size: 28px;
        }

        .add-memory-subtitle {
            font-size: 15px;
        }

        .add-memory-grid {
            grid-template-columns: 1fr;
            gap: 14px;
            margin-top: 22px;
        }

        .add-memory-option {
            min-height: 160px;
            padding: 18px;
        }

        .add-memory-option-title {
            font-size: 19px;
        }

        .add-memory-actions {
            justify-content: stretch;
        }

        .add-memory-cancel {
            width: 100%;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="add-memory-page">
    <div class="add-memory-panel">

        <div class="add-memory-topbar">
            <button
                class="add-memory-back"
                type="button"
                aria-label="Go back"
                onclick="window.history.back()"
            >
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M15 18l-6-6 6-6"></path>
                </svg>
            </button>

            <div class="add-memory-header-copy">
                <h1 class="add-memory-title">Add Memory</h1>
                <p class="add-memory-subtitle">
                    Choose what kind of memory you would like to add.
                </p>
            </div>
        </div>

        <div class="add-memory-grid">
            <button class="add-memory-option is-disabled" type="button" data-kind="text" disabled aria-disabled="true">
                <div class="add-memory-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M7 3.75h7.5L19 8.25v12a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1v-15a1 1 0 0 1 1-1Z"></path>
                        <path d="M14 3.75v4.5h4.5"></path>
                        <path d="M9 12h6"></path>
                        <path d="M9 16h6"></path>
                    </svg>
                </div>
                <div class="add-memory-option-title">Text</div>
                <div class="add-memory-option-text">Write down a meaningful moment, thought, or story.</div>
            </button>

            <button class="add-memory-option" type="button" data-kind="voice" id="voice-button">
                <div class="add-memory-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M12 14a3 3 0 0 0 3-3V7a3 3 0 1 0-6 0v4a3 3 0 0 0 3 3Z"></path>
                        <path d="M19 11a7 7 0 0 1-14 0"></path>
                        <path d="M12 18v3"></path>
                        <path d="M8 21h8"></path>
                    </svg>
                </div>
                <div class="add-memory-option-title">Voice</div>
                <div class="add-memory-option-text">Record a spoken memory or a personal message in your own voice.</div>
            </button>

            <button class="add-memory-option" type="button" data-kind="photo" id="photo-button">
                <div class="add-memory-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                        <circle cx="9" cy="10" r="2"></circle>
                        <path d="m21 15-4.35-4.35a1 1 0 0 0-1.4 0L7 19"></path>
                    </svg>
                </div>
                <div class="add-memory-option-title">Photo</div>
                <div class="add-memory-option-text">Upload an image connected to a special memory or moment.</div>
            </button>

            <button class="add-memory-option" type="button" data-kind="video" id="video-button">
                <div class="add-memory-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="6" width="13" height="12" rx="2"></rect>
                        <path d="m16 10 5-3v10l-5-3z"></path>
                    </svg>
                </div>
                <div class="add-memory-option-title">Video</div>
                <div class="add-memory-option-text">Preserve a meaningful moment with a short video clip.</div>
            </button>

            <button class="add-memory-option is-disabled" type="button" data-kind="document" disabled aria-disabled="true">
                <div class="add-memory-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M7 3.75h7.5L19 8.25v12a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1v-15a1 1 0 0 1 1-1Z"></path>
                        <path d="M14 3.75v4.5h4.5"></path>
                        <path d="M9 12h6"></path>
                        <path d="M9 16h4"></path>
                    </svg>
                </div>
                <div class="add-memory-option-title">Document</div>
                <div class="add-memory-option-text">Upload a letter, note, poem, or another meaningful file.</div>
            </button>
        </div>

        <div class="add-memory-status" id="add-memory-status" aria-live="polite"></div>

        <div class="add-memory-actions">
            <button class="btn btn-secondary add-memory-cancel" type="button" onclick="window.history.back()">
                Cancel
            </button>
        </div>

        <form id="memory-upload-form" hidden>
            <input type="hidden" id="memory-profile-id" value="{{ profile.profile_id if profile else request.args.get('profile_id', '') }}">

            <input
                type="file"
                id="memory-photo-input"
                accept="image/png,image/jpeg,image/webp"
                hidden
            >

            <input
                type="file"
                id="memory-video-input"
                accept="video/mp4,video/quicktime,video/webm,video/x-m4v"
                hidden
            >
        </form>

    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const photoButton = document.getElementById("photo-button");
    const videoButton = document.getElementById("video-button");
    const voiceButton = document.getElementById("voice-button");

    const photoInput = document.getElementById("memory-photo-input");
    const videoInput = document.getElementById("memory-video-input");
    const profileIdInput = document.getElementById("memory-profile-id");
    const statusElement = document.getElementById("add-memory-status");

    let mediaRecorder = null;
    let mediaStream = null;
    let recordedChunks = [];
    let isRecording = false;

    function getAccessToken() {
        return (
            localStorage.getItem("access_token") ||
            localStorage.getItem("token") ||
            localStorage.getItem("jwt") ||
            ""
        );
    }

    function setStatus(message, state = "") {
        statusElement.textContent = message;
        statusElement.className = "add-memory-status";
        if (state) {
            statusElement.classList.add(state);
        }
    }

    async function uploadMemory(file, memoryType) {
        const token = getAccessToken();
        const profileId = profileIdInput.value;

        if (!token) {
            setStatus("You are not logged in.", "is-error");
            return;
        }

        if (!profileId) {
            setStatus("No profile selected.", "is-error");
            return;
        }

        const formData = new FormData();
        formData.append("file", file);
        formData.append("memory_type", memoryType);
        formData.append("profile_id", profileId);

        setStatus("Uploading memory...", "is-loading");

        try {
            const response = await fetch("/api/memories/upload", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${token}`
                },
                body: formData
            });

            const result = await response.json();

            if (!response.ok) {
                setStatus(result.error || "Upload failed.", "is-error");
                return;
            }

            setStatus("Memory uploaded successfully.", "is-success");

            setTimeout(() => {
                window.location.href = `/ui/memories?profile_id=${profileId}`;
            }, 700);
        } catch (error) {
            setStatus("Upload failed. Please try again.", "is-error");
        }
    }

    photoButton?.addEventListener("click", () => {
        photoInput.value = "";
        photoInput.click();
    });

    videoButton?.addEventListener("click", () => {
        videoInput.value = "";
        videoInput.click();
    });

    photoInput?.addEventListener("change", async (event) => {
        const file = event.target.files?.[0];
        if (!file) return;
        await uploadMemory(file, "photo");
    });

    videoInput?.addEventListener("change", async (event) => {
        const file = event.target.files?.[0];
        if (!file) return;
        await uploadMemory(file, "video");
    });

    async function startVoiceRecording() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            setStatus("Audio recording is not supported in this browser.", "is-error");
            return;
        }

        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });

            let mimeType = "";
            if (MediaRecorder.isTypeSupported("audio/webm")) {
                mimeType = "audio/webm";
            } else if (MediaRecorder.isTypeSupported("audio/ogg")) {
                mimeType = "audio/ogg";
            }

            mediaRecorder = mimeType
                ? new MediaRecorder(mediaStream, { mimeType })
                : new MediaRecorder(mediaStream);

            recordedChunks = [];

            mediaRecorder.addEventListener("dataavailable", (event) => {
                if (event.data && event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            });

            mediaRecorder.addEventListener("stop", async () => {
                const finalMimeType = mediaRecorder?.mimeType || "audio/webm";
                const extension = finalMimeType.includes("ogg") ? "ogg" : "webm";
                const blob = new Blob(recordedChunks, { type: finalMimeType });
                const file = new File([blob], `voice-memory.${extension}`, { type: finalMimeType });

                recordedChunks = [];
                await uploadMemory(file, "voice");
            });

            mediaRecorder.start();
            isRecording = true;
            voiceButton.classList.add("is-recording");
            setStatus("Recording... click Voice again to stop.", "is-loading");
        } catch (error) {
            setStatus("Microphone access was denied.", "is-error");
        }
    }

    function stopVoiceRecording() {
        if (!mediaRecorder || !isRecording) return;

        mediaRecorder.stop();

        if (mediaStream) {
            mediaStream.getTracks().forEach((track) => track.stop());
        }

        mediaStream = null;
        isRecording = false;
        voiceButton.classList.remove("is-recording");
        setStatus("Finishing recording...", "is-loading");
    }

    voiceButton?.addEventListener("click", async () => {
        if (isRecording) {
            stopVoiceRecording();
            return;
        }

        await startVoiceRecording();
    });
</script>
{% endblock %}
