{% extends "base.html" %}

{% block content %}
<div class="page-container">
    <div class="dashboard-card">
        <div class="dashboard-card-title">Create a life story</div>
        <div class="dashboard-card-text" style="margin-top: 8px;">
            Start a guided story conversation for {{ profile.full_name }}.
        </div>

        <div style="margin-top: 20px; padding: 16px; background: #f8fafc; border-radius: 14px;">
            <div style="font-weight: 700;">{{ profile.full_name }}</div>
            <div style="color: #6b7280; margin-top: 4px;">
                {{ profile.relationship or "Memorial profile" }}
            </div>
        </div>

        <div style="margin-top: 20px;">
            <a href="/ui/chat/1" class="primary-button">Start guided story chat</a>
        </div>
    </div>
</div>
{% endblock %}
