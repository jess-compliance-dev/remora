{% extends "base.html" %}
{% block title %}Chat | Remora{% endblock %}

{% block content %}
<div class="screen center-screen">
    <div class="phone-card">
        <div class="profile-create-header">
            <h1>Chat</h1>
            <p class="muted" style="text-align:center;">
                Continue a conversation through memories and stories.
            </p>
        </div>

        <div style="
            margin-top: 20px;
            padding: 18px;
            border: 1px solid #ececf3;
            border-radius: 18px;
            background: #f8f9ff;
            text-align: center;
        ">
            <div style="font-size: 40px; margin-bottom: 10px;">💬</div>
            <div style="font-weight: 700; margin-bottom: 8px;">Your conversations live here</div>
            <div class="muted" style="font-size: 14px; line-height: 1.6;">
                Start or continue a memory-based conversation with Remora.
            </div>
        </div>
    </div>
</div>
{% endblock %}
