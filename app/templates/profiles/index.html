{% extends "base.html" %}
{% block content %}

<div class="screen center-screen">
    <div class="phone-card">

        <h1>Your Profiles</h1>
        <p class="muted">People you are remembering</p>

        <div id="profiles-list" class="stack"></div>

        <p id="empty-state" class="muted" style="display:none;">
            No profiles yet.
        </p>

        <p class="foot-link">
            <a href="/ui/dashboard">Back</a>
        </p>

    </div>
</div>

<script>
    async function loadProfiles() {
        const token = localStorage.getItem("access_token");
        const list = document.getElementById("profiles-list");
        const empty = document.getElementById("empty-state");

        list.innerHTML = "";

        try {
            const response = await fetch("/api/profiles", {
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            });

            if (!response.ok) {
                throw new Error("Failed to load profiles");
            }

            const profiles = await response.json();

            if (!profiles.length) {
                empty.style.display = "block";
                return;
            }

            profiles.forEach(profile => {
                const item = document.createElement("div");
                item.className = "profile-card";

                item.innerHTML = `
                    <div style="font-weight:700; font-size:18px;">
                        ${profile.full_name}
                    </div>
                    <div class="muted">
                        ${profile.relationship || "Memorial profile"}
                    </div>
                `;

                list.appendChild(item);
            });

        } catch (error) {
            list.innerHTML = "<p style='color:red;'>Error loading profiles</p>";
        }
    }

    loadProfiles();
</script>

{% endblock %}
