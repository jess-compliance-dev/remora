{% extends "base.html" %}
{% block content %}

<div class="screen">

    <div class="profile-hero">
        <div class="hero-top">
            <a href="/ui/dashboard" class="back-link">← Back</a>

            <button onclick="logout()" class="logout-btn">
                Log out
            </button>
        </div>

        <div class="profile-hero-content">
            <div class="avatar xl" id="profile-avatar"></div>

            <h1 id="profile-name">Loading...</h1>

            <p id="profile-relationship" class="muted"></p>

            <p id="profile-dates" class="muted small-text"></p>

            <p id="profile-description" class="muted"></p>
        </div>

        <div class="profile-actions">
            <button class="btn btn-primary" onclick="goToCreateMemory()">
                Add memory
            </button>

            <button class="btn btn-secondary" onclick="goToLifeStoryChat()">
                Create a life story
            </button>
        </div>
    </div>

    <div class="section-block">
        <div class="section-head">
            <h2>Memories</h2>
        </div>

        <div id="stories-container" class="profiles-stack"></div>
    </div>

</div>

<script>
    const profileId = {{ profile_id }};

    async function loadProfileDetail() {
        const token = localStorage.getItem("token");

        if (!token) {
            window.location.href = "/ui/login";
            return;
        }

        const res = await fetch(`/profiles/${profileId}`, {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (res.status === 401) {
            localStorage.removeItem("token");
            window.location.href = "/ui/login";
            return;
        }

        const data = await res.json();

        if (!res.ok) {
            document.getElementById("profile-name").innerText = "Profile not found";
            return;
        }

        document.getElementById("profile-name").innerText = data.full_name;
        document.getElementById("profile-relationship").innerText = data.relationship || "";
        document.getElementById("profile-description").innerText = data.short_description || "";

        if (data.profile_image_url) {
            document.getElementById("profile-avatar").innerHTML = `<img src="${data.profile_image_url}" alt="${data.full_name}">`;
        }

        document.getElementById("profile-dates").innerText = formatDates(data.birth_date, data.death_date);
    }

    async function loadProfileStories() {
        const token = localStorage.getItem("token");

        const res = await fetch(`/stories/profile/${profileId}`, {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        const data = await res.json();
        const container = document.getElementById("stories-container");

        if (!res.ok || !Array.isArray(data) || data.length === 0) {
            container.innerHTML = `
                <div class="empty-state-card">
                    <h3>No memories yet</h3>
                    <p class="muted">Start preserving moments and life stories for this person.</p>
                </div>
            `;
            return;
        }

        container.innerHTML = data.map(story => `
            <div class="profile-row-card">
                <div>
                    <h3>${story.title || "Untitled memory"}</h3>
                    <p class="muted">${(story.story_text || "").slice(0, 140)}</p>
                    <span class="pill">${story.theme || "memory"}</span>
                </div>
            </div>
        `).join("");
    }

    function formatDates(birth, death) {
        if (birth && death) return `${birth} – ${death}`;
        if (birth) return `Born ${birth}`;
        return "";
    }

    function goToCreateMemory() {
        window.location.href = `/ui/memories/create?profile_id=${profileId}`;
    }

    function goToLifeStoryChat() {
        window.location.href = `/ui/chat?profile_id=${profileId}&category=life_story`;
    }

    loadProfileDetail();
    loadProfileStories();
</script>

{% endblock %}
