{% extends "base.html" %}
{% block content %}

<div class="screen">

    <div class="profile-header">

        <div class="avatar xl"></div>

        <h1 id="profile-name">Loading...</h1>
        <p id="profile-sub" class="muted"></p>

        <div class="profile-actions">
            <button class="btn btn-primary" onclick="goToCreateMemory()">Add memory</button>
            <button class="btn btn-secondary" onclick="goToChat()">Start conversation</button>
        </div>

    </div>

    <div class="section-block">
        <h2>Memories</h2>
        <div id="stories-container" class="profiles-stack"></div>
    </div>

</div>

<script>
    const profileId = {{ profile_id }};

    async function loadProfile() {
        const token = localStorage.getItem("token");

        const res = await fetch(`/profiles/${profileId}`, {
            headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();

        document.getElementById("profile-name").innerText = data.full_name;
        document.getElementById("profile-sub").innerText = data.relationship || "";
    }

    async function loadStories() {
        const token = localStorage.getItem("token");

        const res = await fetch(`/stories/profile/${profileId}`, {
            headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();

        const container = document.getElementById("stories-container");

        if (!data.length) {
            container.innerHTML = "<p>No memories yet.</p>";
            return;
        }

        container.innerHTML = data.map(s => `
            <div class="profile-row-card">
                <div>
                    <h3>${s.title || "Untitled memory"}</h3>
                    <p class="muted">${s.story_text?.slice(0, 120) || ""}</p>
                </div>
            </div>
        `).join("");
    }

    function goToChat() {
        window.location.href = `/ui/chat?profile_id=${profileId}`;
    }

    function goToCreateMemory() {
        window.location.href = `/ui/story?profile_id=${profileId}`;
    }

    loadProfile();
    loadStories();
</script>

{% endblock %}
