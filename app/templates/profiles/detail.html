{% extends "base.html" %}
{% block content %}

<div class="screen">

    <div class="profile-hero">

        <div class="hero-top">
            <a href="/ui/dashboard" class="back-link">← Back</a>

            <button onclick="logout()" class="logout-btn">
                Log out
            </button>
        </div>

        <div class="profile-hero-content">

            <div class="avatar xl" id="profile-avatar"></div>

            <h1 id="profile-name">Loading...</h1>

            <p id="profile-relationship" class="muted"></p>

            <p id="profile-dates" class="muted small-text"></p>

        </div>

        <div class="profile-actions">
            <button class="btn btn-primary" onclick="goToCreateMemory()">
                Add memory
            </button>

            <button class="btn btn-secondary" onclick="goToChat()">
                Start conversation
            </button>
        </div>

    </div>

    <div class="section-block">
        <div class="section-head">
            <h2>Memories</h2>
        </div>

        <div id="stories-container" class="profiles-stack"></div>
    </div>

</div>

<script>
    const profileId = {{ profile_id }};

    async function loadProfile() {
        const token = localStorage.getItem("token");

        const res = await fetch(`/profiles/${profileId}`, {
            headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();

        document.getElementById("profile-name").innerText = data.full_name;
        document.getElementById("profile-relationship").innerText = data.relationship || "";

        // Avatar
        if (data.profile_image_url) {
            document.getElementById("profile-avatar").innerHTML =
                `<img src="${data.profile_image_url}" />`;
        }

        // Dates
        document.getElementById("profile-dates").innerText =
            formatDates(data.birth_date, data.death_date);
    }

    function formatDates(birth, death) {
        if (birth && death) return `${birth} – ${death}`;
        if (birth) return `Born ${birth}`;
        return "";
    }

    async function loadStories() {
        const token = localStorage.getItem("token");

        const res = await fetch(`/stories/profile/${profileId}`, {
            headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();

        const container = document.getElementById("stories-container");

        if (!data.length) {
            container.innerHTML = `
                <div class="empty-state-card">
                    <h3>No memories yet</h3>
                    <p class="muted">Start capturing meaningful moments.</p>
                </div>
            `;
            return;
        }

        container.innerHTML = data.map(s => `
            <div class="profile-row-card">
                <div>
                    <h3>${s.title || "Untitled memory"}</h3>
                    <p class="muted">${s.story_text?.slice(0, 120) || ""}</p>
                </div>
            </div>
        `).join("");
    }

    function goToChat() {
        window.location.href = `/ui/chat?profile_id=${profileId}`;
    }

    function goToCreateMemory() {
        window.location.href = `/ui/memories/create?profile_id=${profileId}`;
    }

    loadProfile();
    loadStories();
</script>

{% endblock %}
