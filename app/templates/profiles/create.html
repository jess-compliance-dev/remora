{% extends "base.html" %}
{% block content %}

<div class="screen center-screen">
    <div class="phone-card profile-create-screen">

        <div class="progress-row top-progress">
            <span class="progress-dot active"></span>
            <span class="progress-line"></span>
            <span class="progress-dot"></span>
            <span class="progress-line"></span>
            <span class="progress-dot"></span>
        </div>

        <div class="profile-create-header">
            <h1>Create a memorial profile</h1>
            <p class="muted">Who would you like to remember?</p>
        </div>

        <form id="create-profile-form" class="stack">

            <div class="image-upload-placeholder">
                <label for="profile-image-input" class="avatar-upload-circle clickable">
                    <img id="profile-image-preview"
                         src=""
                         alt="Profile preview"
                         class="profile-preview hidden">
                    <span id="profile-image-icon" class="image-icon">🖼</span>
                </label>

                <input
                    id="profile-image-input"
                    type="file"
                    accept="image/*"
                    class="hidden-file-input"
                >

                <button type="button" class="mini-add-btn" onclick="document.getElementById('profile-image-input').click()">＋</button>
            </div>

            <input
                id="full_name"
                class="input"
                type="text"
                placeholder="Full name"
                required
            >

            <input
                id="relationship"
                class="input"
                type="text"
                placeholder="Your relationship"
            >

            <div class="dates-toggle-row">
                <label class="toggle-label" for="show-dates-toggle">
                    Add birth and passing dates
                    <span class="muted small-text">(optional)</span>
                </label>

                <label class="switch">
                    <input type="checkbox" id="show-dates-toggle">
                    <span class="slider"></span>
                </label>
            </div>

            <div id="dates-fields" class="stack hidden">
                <input id="birth_date" class="input" type="date">
                <input id="death_date" class="input" type="date">
            </div>

            <textarea
                id="short_description"
                class="input"
                rows="4"
                placeholder="A short description or a few words about this person"
            ></textarea>

            <button class="btn btn-primary wide-btn" type="submit">
                Continue
            </button>

        </form>

        <p id="profile-error" class="error-text"></p>

        <p class="foot-link">
            <a href="/ui/dashboard">Back</a>
        </p>

    </div>
</div>

<script>
    const toggle = document.getElementById("show-dates-toggle");
    const datesFields = document.getElementById("dates-fields");
    const imageInput = document.getElementById("profile-image-input");
    const imagePreview = document.getElementById("profile-image-preview");
    const imageIcon = document.getElementById("profile-image-icon");

    if (toggle) {
        toggle.addEventListener("change", () => {
            if (toggle.checked) {
                datesFields.classList.remove("hidden");
            } else {
                datesFields.classList.add("hidden");
            }
        });
    }

    if (imageInput) {
        imageInput.addEventListener("change", () => {
            const file = imageInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                imagePreview.src = e.target.result;
                imagePreview.classList.remove("hidden");
                imageIcon.classList.add("hidden");
            };
            reader.readAsDataURL(file);
        });
    }
</script>

{% endblock %}
