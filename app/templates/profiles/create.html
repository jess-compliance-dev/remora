{% extends "base.html" %}
{% block title %}Create Memorial Profile | Remora{% endblock %}

{% block content %}
<div style="max-width: 860px; margin: 0 auto; padding: 28px 20px 56px;">

    <div style="margin-bottom: 22px;">
        <a href="/ui/select-profiles" style="
            text-decoration: none;
            color: #7d84a6;
            font-weight: 600;
            font-size: 14px;
        ">
            ← Back
        </a>
    </div>

    <div style="
        background: #ffffff;
        border: 1px solid #e7e9f4;
        border-radius: 28px;
        padding: 34px 34px 30px;
        box-shadow: 0 10px 30px rgba(86, 97, 160, 0.08);
    ">
        <div class="progress-row top-progress" style="justify-content: flex-start; margin-bottom: 22px;">
            <span class="progress-dot active"></span>
            <span class="progress-line"></span>
            <span class="progress-dot"></span>
            <span class="progress-line"></span>
            <span class="progress-dot"></span>
        </div>

        <div style="margin-bottom: 24px;">
            <h1 style="
                margin: 0 0 8px 0;
                font-size: 36px;
                line-height: 1.1;
                color: #2f355c;
                text-align: left;
            ">
                Create a memorial profile
            </h1>
            <p class="muted" style="
                margin: 0;
                font-size: 18px;
                line-height: 1.6;
            ">
                Who would you like to remember?
            </p>
        </div>

        <form id="create-profile-form">
            <input type="hidden" id="profile_image_url" name="profile_image_url">

            <div style="
                display: grid;
                grid-template-columns: 180px 1fr;
                gap: 28px;
                align-items: start;
            ">
                <div>
                    <div style="display:flex; flex-direction:column; align-items:center;">
                        <label for="profile-image-input" style="
                            width: 150px;
                            height: 150px;
                            border-radius: 50%;
                            background: #eef0ff;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            overflow: hidden;
                            cursor: pointer;
                            border: 1px solid #dfe3f2;
                        ">
                            <img id="profile-image-preview"
                                 src=""
                                 alt="Profile preview"
                                 style="width:100%; height:100%; object-fit:cover; display:none;">
                            <span id="profile-image-icon" style="font-size: 40px; color: #7b82d8;">🖼️</span>
                        </label>

                        <input
                            id="profile-image-input"
                            type="file"
                            accept="image/*"
                            style="display:none;"
                        >

                        <button
                            type="button"
                            onclick="document.getElementById('profile-image-input').click()"
                            style="
                                margin-top: 14px;
                                padding: 10px 14px;
                                border-radius: 14px;
                                border: 1px solid #dfe3f2;
                                background: #ffffff;
                                color: #5c63d6;
                                cursor: pointer;
                                font-weight: 600;
                            "
                        >
                            Upload image
                        </button>
                    </div>
                </div>

                <div>
                    <div style="display:grid; gap: 14px;">
                        <input
                            id="full_name"
                            name="full_name"
                            class="input"
                            type="text"
                            placeholder="Full name"
                            required
                        >

                        <input
                            id="relationship"
                            name="relationship"
                            class="input"
                            type="text"
                            placeholder="Your relationship"
                        >

                        <div style="
                            display: flex;
                            align-items: center;
                            justify-content: space-between;
                            gap: 12px;
                            padding: 4px 2px;
                        ">
                            <label for="show-dates-toggle" style="
                                color: #2f355c;
                                font-weight: 600;
                                line-height: 1.4;
                                cursor: pointer;
                            ">
                                Add birth and passing dates
                                <span class="muted" style="font-weight: 400;">(optional)</span>
                            </label>

                            <input type="checkbox" id="show-dates-toggle">
                        </div>

                        <div id="dates-fields" style="display:none; gap: 14px;">
                            <input id="birth_date" name="birth_date" class="input" type="date">
                            <input id="death_date" name="death_date" class="input" type="date">
                        </div>

                        <textarea
                            id="short_description"
                            name="short_description"
                            class="input"
                            rows="5"
                            placeholder="A short description or a few words about this person"
                            style="resize: vertical;"
                        ></textarea>
                    </div>
                </div>
            </div>

            <div style="
                display: flex;
                justify-content: flex-end;
                gap: 12px;
                margin-top: 26px;
            ">
                <a href="/ui/select-profiles" class="btn" style="
                    width: auto;
                    background: #f3f4f8;
                    color: #6b7280;
                    text-decoration: none;
                    padding-left: 22px;
                    padding-right: 22px;
                ">
                    Cancel
                </a>

                <button id="submit-btn" class="btn btn-primary" type="submit" style="
                    width: auto;
                    padding-left: 26px;
                    padding-right: 26px;
                ">
                    Continue
                </button>
            </div>
        </form>

        <p id="profile-error" class="error-text" style="text-align:left; margin-top:14px;"></p>
    </div>
</div>

<script>
    const toggle = document.getElementById("show-dates-toggle");
    const datesFields = document.getElementById("dates-fields");
    const imageInput = document.getElementById("profile-image-input");
    const imagePreview = document.getElementById("profile-image-preview");
    const imageIcon = document.getElementById("profile-image-icon");
    const profileImageUrlInput = document.getElementById("profile_image_url");
    const form = document.getElementById("create-profile-form");
    const errorBox = document.getElementById("profile-error");
    const submitBtn = document.getElementById("submit-btn");

    function getAuthHeaders(extraHeaders = {}) {
        const token = localStorage.getItem("access_token");

        if (!token) {
            throw new Error("You are not logged in. Please log in again.");
        }

        return {
            "Authorization": `Bearer ${token}`,
            ...extraHeaders
        };
    }

    if (toggle) {
        toggle.addEventListener("change", () => {
            if (toggle.checked) {
                datesFields.style.display = "grid";
            } else {
                datesFields.style.display = "none";
                document.getElementById("birth_date").value = "";
                document.getElementById("death_date").value = "";
            }
        });
    }

    if (imageInput) {
        imageInput.addEventListener("change", () => {
            const file = imageInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                imagePreview.src = e.target.result;
                imagePreview.style.display = "block";
                imageIcon.style.display = "none";
            };
            reader.readAsDataURL(file);
        });
    }

    form.addEventListener("submit", async function (event) {
        event.preventDefault();
        errorBox.textContent = "";
        submitBtn.disabled = true;
        submitBtn.textContent = "Saving...";

        try {
            const imageFile = imageInput.files[0];

            if (imageFile) {
                const imageFormData = new FormData();
                imageFormData.append("image", imageFile);

                const uploadResponse = await fetch("/api/profiles/upload-image", {
                    method: "POST",
                    headers: getAuthHeaders(),
                    body: imageFormData
                });

                if (!uploadResponse.ok) {
                    let uploadError = "Image upload failed.";
                    try {
                        const uploadData = await uploadResponse.json();
                        uploadError = uploadData.error || uploadError;
                    } catch (_) {}
                    throw new Error(uploadError);
                }

                const uploadData = await uploadResponse.json();
                profileImageUrlInput.value = uploadData.profile_image_url || "";
            }

            const payload = {
                full_name: document.getElementById("full_name").value.trim(),
                relationship: document.getElementById("relationship").value.trim(),
                birth_date: document.getElementById("birth_date").value || null,
                death_date: document.getElementById("death_date").value || null,
                short_description: document.getElementById("short_description").value.trim(),
                profile_image_url: profileImageUrlInput.value || null
            };

            const response = await fetch("/api/profiles", {
                method: "POST",
                headers: getAuthHeaders({
                    "Content-Type": "application/json"
                }),
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                let errorMessage = "Unable to create profile.";
                try {
                    const errorData = await response.json();
                    errorMessage = errorData.error || errorMessage;
                } catch (_) {}
                throw new Error(errorMessage);
            }

            const profile = await response.json();

            localStorage.setItem("active_profile_id", String(profile.profile_id));
            localStorage.setItem("active_profile_name", profile.full_name || "");
            localStorage.setItem("active_profile_relationship", profile.relationship || "");
            localStorage.setItem("active_profile_image_url", profile.profile_image_url || "");

            window.location.href = "/ui/dashboard";
        } catch (error) {
            errorBox.textContent = error.message || "Something went wrong.";
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Continue";
        }
    });
</script>
{% endblock %}
