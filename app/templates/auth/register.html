{% extends "base.html" %}
{% block content %}
<div class="screen center-screen">
    <div class="phone-card auth-card">

        <!-- Logo -->
        <img src="{{ url_for('static', filename='img/logo.png') }}"
             class="logo"
             alt="Remora logo">

        <!-- Titel -->
        <h1>Create account</h1>
        <p class="muted">Start building your memory space.</p>

        <!-- Formular -->
        <form id="register-form" class="stack">

            <input
                id="username"
                name="username"
                class="input"
                type="text"
                placeholder="Username"
                required
            >

            <input
                id="email"
                name="email"
                class="input"
                type="email"
                placeholder="Email address"
                required
            >

            <input
                id="password"
                name="password"
                class="input"
                type="password"
                placeholder="Password"
                required
            >

            <button id="submit-btn" class="btn btn-primary" type="submit">
                Sign up
            </button>

        </form>

        <!-- Fehleranzeige -->
        <p id="error-message" style="color:red; margin-top:10px;"></p>
        <p id="success-message" style="color:green; margin-top:10px;"></p>

        <!-- Divider -->
        <div class="divider"><span>or</span></div>

        <!-- Optional Social -->
        <div class="stack">
            <button class="btn btn-secondary" type="button">Continue with Google</button>
            <button class="btn btn-secondary" type="button">Continue with Apple</button>
        </div>

        <!-- Login Link -->
        <p class="foot-link">
            Already have an account?
            <a href="/ui/login">Log in</a>
        </p>

    </div>
</div>

<script>
    const form = document.getElementById("register-form");
    const errorBox = document.getElementById("error-message");
    const successBox = document.getElementById("success-message");
    const submitBtn = document.getElementById("submit-btn");

    form.addEventListener("submit", async function (event) {
        event.preventDefault();

        errorBox.textContent = "";
        successBox.textContent = "";

        submitBtn.disabled = true;
        submitBtn.textContent = "Creating...";

        try {
            const payload = {
                username: document.getElementById("username").value.trim(),
                email: document.getElementById("email").value.trim(),
                password: document.getElementById("password").value
            };

            const response = await fetch("/api/auth/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || "Registration failed.");
            }

            successBox.textContent = data.message || "Account created successfully.";

            // kleine UX-Verbesserung: kurze Pause → dann Login
            setTimeout(() => {
                window.location.href = "/ui/login";
            }, 1200);

        } catch (error) {
            errorBox.textContent = error.message || "Something went wrong.";
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Sign up";
        }
    });
</script>

{% endblock %}
