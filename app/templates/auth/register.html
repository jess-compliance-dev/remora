{% extends "base.html" %}
{% block title %}Create Account | Remora{% endblock %}

{% block content %}
<div style="max-width: 1180px; margin: 0 auto; padding: 32px 20px 64px;">

    <div style="
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 36px;
        align-items: center;
        min-height: calc(100vh - 120px);
    ">

        <div>
            <div style="
                max-width: 460px;
                margin-left: auto;
                background: #ffffff;
                border: 1px solid #e7e9f4;
                border-radius: 30px;
                padding: 34px 30px 28px;
                box-shadow: 0 16px 40px rgba(86, 97, 160, 0.10);
            ">

                <div style="text-align: center; margin-bottom: 26px;">
                    <img src="{{ url_for('static', filename='img/logo.png') }}"
                         alt="Remora logo"
                         style="width: 90px; height: auto; display: block; margin: 0 auto 16px auto;">

                    <h2 style="
                        margin: 0 0 8px 0;
                        font-size: 34px;
                        color: #2f355c;
                        line-height: 1.1;
                    ">
                        Create account
                    </h2>

                    <p class="muted" style="
                        margin: 0;
                        font-size: 16px;
                        line-height: 1.6;
                    ">
                        Start building your memory space.
                    </p>
                </div>

                <form id="register-form" class="stack">

                    <input
                        id="username"
                        name="username"
                        class="input"
                        type="text"
                        placeholder="Username"
                        required
                    >

                    <input
                        id="email"
                        name="email"
                        class="input"
                        type="email"
                        placeholder="Email address"
                        required
                    >

                    <input
                        id="password"
                        name="password"
                        class="input"
                        type="password"
                        placeholder="Password"
                        required
                    >

                    <button id="submit-btn" class="btn btn-primary" type="submit">
                        Sign up
                    </button>
                </form>

                <p id="error-message" style="color:#dc2626; margin-top:12px; min-height:20px;"></p>
                <p id="success-message" style="color:#15803d; margin-top:8px; min-height:20px;"></p>

                <div style="
                    display:flex;
                    align-items:center;
                    gap:14px;
                    margin: 16px 0 18px;
                    color:#a0a6c2;
                    font-size:14px;
                ">
                    <div style="height:1px; background:#e7e9f4; flex:1;"></div>
                    <span>or</span>
                    <div style="height:1px; background:#e7e9f4; flex:1;"></div>
                </div>

                <div class="stack">
                    <button class="btn btn-secondary" type="button">Continue with Google</button>
                    <button class="btn btn-secondary" type="button">Continue with Apple</button>
                </div>

                <p class="foot-link" style="margin-top: 20px;">
                    Already have an account?
                    <a href="/ui/login">Log in</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById("register-form");
    const errorBox = document.getElementById("error-message");
    const successBox = document.getElementById("success-message");
    const submitBtn = document.getElementById("submit-btn");

    form.addEventListener("submit", async function (event) {
        event.preventDefault();

        errorBox.textContent = "";
        successBox.textContent = "";

        submitBtn.disabled = true;
        submitBtn.textContent = "Creating...";

        try {
            const payload = {
                username: document.getElementById("username").value.trim(),
                email: document.getElementById("email").value.trim(),
                password: document.getElementById("password").value
            };

            const response = await fetch("/api/auth/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || "Registration failed.");
            }

            successBox.textContent = data.message || "Account created successfully.";

            setTimeout(() => {
                window.location.href = "/ui/login";
            }, 1200);

        } catch (error) {
            errorBox.textContent = error.message || "Something went wrong.";
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Sign up";
        }
    });
</script>

<style>
    @media (max-width: 920px) {
        div[style*="grid-template-columns: 1.1fr 0.9fr;"] {
            grid-template-columns: 1fr !important;
            gap: 24px !important;
            min-height: auto !important;
        }

        h1[style*="font-size: 54px"] {
            font-size: 38px !important;
        }

        div[style*="max-width: 460px;"] {
            margin-left: 0 !important;
            max-width: 100% !important;
        }
    }
</style>
{% endblock %}
