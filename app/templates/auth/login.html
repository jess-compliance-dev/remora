{% extends "base.html" %}
{% block content %}

<div class="screen center-screen">
    <div class="phone-card auth-card">

        <img src="{{ url_for('static', filename='img/logo.png') }}"
             class="logo"
             alt="Remora logo">

        <h1>Welcome back</h1>
        <p class="muted">Sign in to continue preserving memories.</p>

        <form id="login-form" class="stack">

            <input
                id="login-email"
                class="input"
                type="email"
                placeholder="Email address"
                required
            >

            <input
                id="login-password"
                class="input"
                type="password"
                placeholder="Password"
                required
            >

            <button class="btn btn-primary" type="submit">
                Log in
            </button>

        </form>

        <p id="login-error" class="error-text"></p>

        <div class="divider"><span>or</span></div>

        <div class="stack">
            <button class="btn btn-secondary" type="button">Continue with Google</button>
            <button class="btn btn-secondary" type="button">Continue with Apple</button>
        </div>

        <p class="foot-link">
            No account yet?
            <a href="/ui/register">Create one</a>
        </p>

    </div>
</div>

{% endblock %}
