{% extends "base.html" %}
{% block title %}Log In | Remora{% endblock %}

{% block content %}
<div style="max-width: 1180px; margin: 0 auto; padding: 32px 20px 64px;">

    <div style="
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 120px);
    ">

        <div style="
            width: 100%;
            max-width: 460px;
            background: #ffffff;
            border: 1px solid #e7e9f4;
            border-radius: 30px;
            padding: 34px 30px 28px;
            box-shadow: 0 16px 40px rgba(86, 97, 160, 0.10);
        ">

            <div style="text-align: center; margin-bottom: 26px;">
                <img src="{{ url_for('static', filename='img/logo.png') }}"
                     alt="Remora logo"
                     style="width: 150px; height: auto; display: block; margin: 0 auto 18px auto;">

                <h2 style="
                    margin: 0 0 8px 0;
                    font-size: 34px;
                    color: #2f355c;
                    line-height: 1.1;
                ">
                    Log in
                </h2>

                <p class="muted" style="
                    margin: 0;
                    font-size: 16px;
                    line-height: 1.6;
                ">
                    Start building your memory space.
                </p>
            </div>

            <form id="login-form" class="stack">
                <input
                    id="email"
                    name="email"
                    class="input"
                    type="email"
                    placeholder="Email address"
                    required
                >

                <input
                    id="password"
                    name="password"
                    class="input"
                    type="password"
                    placeholder="Password"
                    required
                >

                <button id="submit-btn" class="btn btn-primary" type="submit">
                    Log in
                </button>
            </form>

            <p id="login-error" style="color:#dc2626; margin-top:12px; min-height:20px;"></p>

            <div style="
                display:flex;
                align-items:center;
                gap:14px;
                margin: 16px 0 18px;
                color:#a0a6c2;
                font-size:14px;
            ">
                <div style="height:1px; background:#e7e9f4; flex:1;"></div>
                <span>or</span>
                <div style="height:1px; background:#e7e9f4; flex:1;"></div>
            </div>

            <div class="stack">
                <button class="btn btn-secondary" type="button">Continue with Google</button>
                <button class="btn btn-secondary" type="button">Continue with Apple</button>
            </div>

            <p class="foot-link" style="margin-top: 20px;">
                Don’t have an account?
                <a href="/ui/register">Create account</a>
            </p>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById("login-form");
    const errorBox = document.getElementById("login-error");
    const submitBtn = document.getElementById("submit-btn");

    form.addEventListener("submit", async function (event) {
        event.preventDefault();

        errorBox.textContent = "";
        submitBtn.disabled = true;
        submitBtn.textContent = "Logging in...";

        try {
            const payload = {
                email: document.getElementById("email").value.trim(),
                password: document.getElementById("password").value
            };

            const response = await fetch("/api/auth/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || "Login failed.");
            }

            if (!data.access_token) {
                throw new Error("No access token received.");
            }

            localStorage.setItem("access_token", data.access_token);
            window.location.href = "/ui/select-profiles";

        } catch (error) {
            errorBox.textContent = error.message || "Something went wrong.";
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Log in";
        }
    });
</script>
{% endblock %}
