{% extends "base.html" %}
{% block content %}

<div class="screen center-screen">
    <div class="phone-card auth-screen">

        <div class="profile-create-header">
            <h1>Welcome back</h1>
            <p class="muted">Log in to continue with Remora.</p>
        </div>

        <form id="login-form" class="stack">
            <input
                id="email"
                name="email"
                class="input"
                type="email"
                placeholder="Email address"
                required
            >

            <input
                id="password"
                name="password"
                class="input"
                type="password"
                placeholder="Password"
                required
            >

            <button id="login-btn" class="btn btn-primary wide-btn" type="submit">
                Log in
            </button>
        </form>

        <p id="login-error" class="error-text"></p>

        <p class="foot-link">
            <a href="/ui/register">Create account</a>
        </p>
    </div>
</div>

<script>
    const form = document.getElementById("login-form");
    const errorBox = document.getElementById("login-error");
    const submitBtn = document.getElementById("login-btn");

    form.addEventListener("submit", async function (event) {
        event.preventDefault();

        errorBox.textContent = "";
        submitBtn.disabled = true;
        submitBtn.textContent = "Logging in...";

        try {
            const payload = {
                email: document.getElementById("email").value.trim(),
                password: document.getElementById("password").value
            };

            const response = await fetch("/api/auth/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || "Login failed.");
            }

            if (!data.access_token) {
                throw new Error("No access token received.");
            }

            localStorage.setItem("access_token", data.access_token);
            window.location.href = "/ui/dashboard";

        } catch (error) {
            errorBox.textContent = error.message || "Something went wrong.";
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Log in";
        }
    });
</script>

{% endblock %}
